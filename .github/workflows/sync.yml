name: Sync Knowledge Base

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Clone Knowledge Base
        uses: actions/checkout@v6
        with:
          repository: Hujunchuan/HuJunchuanKnowledgeBase
          path: content
          token: ${{ secrets.GH_TOKEN }}
          
      - name: Checkout Quartz files
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            quartz
            quartz.config.ts
            quartz.layout.ts
            package.json
            package-lock.json
            tsconfig.json
            .node-version
            .gitignore
          sparse-checkout-cone-mode: false
          
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          
      - name: Install
        run: npm ci
          
      - name: Build
        run: npx quartz build
          
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          publish_dir: ./public
