name: Sync Knowledge Base

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clone Knowledge Base
        run: |
          git clone https://github.com/Hujunchuan/HuJunchuanKnowledgeBase.git content
          
      - name: Checkout Quartz files
        run: |
          git sparse-checkout set quartz quartz.config.ts quartz.layout.ts package.json package-lock.json tsconfig.json .node-version .gitignore
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install
        run: npm ci
          
      - name: Build
        run: npx quartz build
          
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          publish_dir: ./public
