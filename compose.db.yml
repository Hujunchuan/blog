services:
  postgres:
    image: postgres:16-alpine
    container_name: knowledge-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: knowledge_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - knowledge_platform_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowledge_platform"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  knowledge_platform_pgdata:
